<title>QC Inspection Management System</title>
<style>
:root {
  --primary: #1a365d; --primary-light: #2c5282; --primary-dark: #0d1b2a;
  --secondary: #3182ce; --accent: #ed8936; --success: #38a169;
  --danger: #e53e3e; --warning: #d69e2e; --info: #4299e1;
  --bg: #f7fafc; --card-bg: #ffffff; --text: #1a202c; --text-light: #718096;
  --border: #e2e8f0;
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
  --radius: 8px; --radius-lg: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
.app-header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); color: white; padding: 16px 24px; box-shadow: var(--shadow-lg); position: sticky; top: 0; z-index: 1000; }
.app-header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: 0.5px; }
.app-header .subtitle { font-size: 0.8rem; opacity: 0.8; margin-top: 2px; }
.nav-bar { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 0 16px; display: flex; overflow-x: auto; gap: 4px; position: sticky; top: 68px; z-index: 999; }
.nav-btn { padding: 12px 20px; border: none; background: transparent; color: var(--text-light); font-size: 0.85rem; font-weight: 500; cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
.nav-btn:hover { color: var(--primary); }
.nav-btn.active { color: var(--primary); border-bottom-color: var(--secondary); background: rgba(49, 130, 206, 0.05); }
.nav-btn .badge { background: var(--danger); color: white; font-size: 0.65rem; padding: 2px 6px; border-radius: 10px; font-weight: 600; }
.main-content { padding: 24px; max-width: 1400px; margin: 0 auto; }
.dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--card-bg); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow); border-left: 4px solid var(--secondary); transition: transform 0.2s; }
.stat-card:hover { transform: translateY(-2px); }
.stat-card.overdue { border-left-color: var(--danger); }
.stat-card.pending { border-left-color: var(--warning); }
.stat-card.approved { border-left-color: var(--success); }
.stat-card.rejected { border-left-color: var(--danger); }
.stat-card.today { border-left-color: var(--info); }

.stat-card .value { font-size: 2rem; font-weight: 700; color: var(--primary); margin-top: 4px; }
.stat-card.overdue .value { color: var(--danger); }
.stat-card.pending .value { color: var(--warning); }
.stat-card.approved .value { color: var(--success); }
.section-title { font-size: 1.1rem; font-weight: 600; color: var(--primary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

.card-body { padding: 20px; }
.btn { padding: 10px 20px; border-radius: var(--radius); border: none; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: var(--secondary); color: white; }
.btn-primary:hover { background: var(--primary-light); }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { background: #2f855a; }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #c53030; }
.btn-warning { background: var(--warning); color: white; }
.btn-warning:hover { background: #b7791f; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { background: var(--bg); }
.btn-sm { padding: 6px 12px; font-size: 0.75rem; }
.btn-lg { padding: 14px 28px; font-size: 1rem; }
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-light); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.3px; }
.form-input, .form-select, .form-textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.9rem; transition: border-color 0.2s; font-family: inherit; }
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--secondary); box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1); }
.form-textarea { min-height: 80px; resize: vertical; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; }
.data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.data-table th { background: var(--bg); padding: 12px 16px; text-align: left; font-weight: 600; color: var(--text-light); text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.5px; border-bottom: 2px solid var(--border); }
.data-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.data-table tr:hover { background: rgba(49, 130, 206, 0.02); }

.badge-under_qc { background: #bee3f8; color: #2b6cb0; }
.badge-pending { background: #fefcbf; color: #975a16; }
.badge-approved { background: #c6f6d5; color: #276749; }
.badge-rejected { background: #fed7d7; color: #c53030; }
.badge-overdue { background: #fed7d7; color: #c53030; }
.job-list { display: flex; flex-direction: column; gap: 12px; }
.job-card { background: var(--card-bg); border-radius: var(--radius); padding: 16px 20px; box-shadow: var(--shadow); border-left: 4px solid var(--secondary); display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: all 0.2s; }
.job-card:hover { box-shadow: var(--shadow-lg); transform: translateX(4px); }
.job-card.overdue { border-left-color: var(--danger); }
.job-card.pending { border-left-color: var(--warning); }
.job-card.approved { border-left-color: var(--success); }
.job-card.rejected { border-left-color: var(--danger); }
.job-card-info h4 { font-size: 0.95rem; font-weight: 600; color: var(--primary); }
.job-card-info p { font-size: 0.8rem; color: var(--text-light); margin-top: 2px; }
.job-card-actions { display: flex; gap: 8px; align-items: center; }
.inspection-form { background: var(--card-bg); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow); }
.form-section { margin-bottom: 28px; }
.form-section-title { font-size: 1rem; font-weight: 600; color: var(--primary); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--border); display: flex; align-items: center; gap: 8px; }
.measurement-grid { overflow-x: auto; }
.measurement-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 600px; }
.measurement-table th { background: var(--primary); color: white; padding: 10px 12px; text-align: center; font-weight: 600; font-size: 0.8rem; }
.measurement-table th .sub-label { font-size: 0.7rem; opacity: 0.8; font-weight: 400; }
.measurement-table th .spec { font-size: 0.75rem; opacity: 0.9; margin-top: 2px; }
.measurement-table th .tool { font-size: 0.7rem; opacity: 0.7; margin-top: 2px; }
.measurement-table td { padding: 8px 10px; border: 1px solid var(--border); text-align: center; }
.measurement-table td:first-child { background: var(--bg); font-weight: 600; width: 60px; }
.measurement-input { width: 80px; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px; text-align: center; font-size: 0.85rem; }
.measurement-input:focus { outline: none; border-color: var(--secondary); }
.measurement-input.out-of-spec { background: #fff5f5; border-color: var(--danger); color: var(--danger); }
.appearance-list { display: flex; flex-direction: column; gap: 8px; }
.appearance-item { display: flex; align-items: center; padding: 12px 16px; background: var(--bg); border-radius: var(--radius); gap: 16px; }
.appearance-item .number { width: 28px; height: 28px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 600; flex-shrink: 0; }
.appearance-item .name { flex: 1; font-size: 0.9rem; }
.appearance-item .result-group { display: flex; gap: 8px; }
.result-btn { padding: 6px 16px; border-radius: 4px; border: 2px solid var(--border); background: white; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; }
.result-btn:hover { border-color: var(--secondary); }
.result-btn.ok.active { background: var(--success); border-color: var(--success); color: white; }
.result-btn.ng.active { background: var(--danger); border-color: var(--danger); color: white; }
.photo-section { margin-top: 12px; }
.photo-upload-area { border: 2px dashed var(--border); border-radius: var(--radius); padding: 24px; text-align: center; cursor: pointer; transition: all 0.2s; }
.photo-upload-area:hover { border-color: var(--secondary); background: rgba(49, 130, 206, 0.02); }
.photo-upload-area input { display: none; }
.photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; margin-top: 12px; }
.photo-item { position: relative; border-radius: var(--radius); overflow: hidden; aspect-ratio: 1; background: var(--bg); }
.photo-item img { width: 100%; height: 100%; object-fit: cover; }
.photo-item .remove-btn { position: absolute; top: 4px; right: 4px; width: 24px; height: 24px; background: var(--danger); color: white; border: none; border-radius: 50%; cursor: pointer; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; }
.final-result { display: flex; gap: 16px; justify-content: center; padding: 20px; }
.final-result-btn { padding: 16px 48px; border-radius: var(--radius-lg); border: 3px solid var(--border); background: white; font-size: 1.2rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.final-result-btn.ok:hover { border-color: var(--success); }
.final-result-btn.ok.active { background: var(--success); border-color: var(--success); color: white; }
.final-result-btn.ng:hover { border-color: var(--danger); }
.final-result-btn.ng.active { background: var(--danger); border-color: var(--danger); color: white; }
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
.modal-content { background: var(--card-bg); border-radius: var(--radius-lg); max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
.modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-header h2 { font-size: 1.2rem; color: var(--primary); }
.modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-light); }
.modal-body { padding: 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px; }
.search-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.search-bar .form-input { flex: 1; min-width: 200px; }
.loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-light); }
.spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--secondary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { text-align: center; padding: 40px; color: var(--text-light); }
.toast-container { position: fixed; top: 80px; right: 20px; z-index: 3000; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 12px 20px; border-radius: var(--radius); color: white; font-size: 0.85rem; font-weight: 500; box-shadow: var(--shadow-lg); animation: slideIn 0.3s ease; max-width: 400px; }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
.toast.warning { background: var(--warning); }
.toast.info { background: var(--info); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.approval-view { background: var(--bg); border-radius: var(--radius); padding: 20px; }
.approval-section { margin-bottom: 20px; }
.approval-section h4 { font-size: 0.9rem; color: var(--primary); margin-bottom: 12px; }
.log-entry { padding: 8px 12px; background: white; border-radius: var(--radius); margin-bottom: 8px; font-size: 0.8rem; border-left: 3px solid var(--secondary); }
.log-entry .time { color: var(--text-light); font-size: 0.75rem; }
.spec-within { background: #f0fff4 !important; }
.spec-out { background: #fff5f5 !important; color: var(--danger) !important; font-weight: 600; }
.hidden { display: none !important; }
@media print { .app-header, .nav-bar, .btn, .modal-overlay, .toast-container { display: none !important; } .main-content { padding: 0; } .card { box-shadow: none; border: 1px solid #ccc; } }
@media (max-width: 768px) { .main-content { padding: 12px; } .dashboard-grid { grid-template-columns: repeat(2, 1fr); } .job-card { flex-direction: column; align-items: flex-start; gap: 12px; } .job-card-actions { width: 100%; justify-content: flex-end; } .search-bar { flex-direction: column; } .search-bar .form-input { width: 100%; } }
</style>

<body>

<div class="toast-container" id="toastContainer"></div>

<header class="app-header">
  <h1>QC Inspection Management System</h1>
  <div class="subtitle">Megacell International Co., Ltd. — Professional Factory QC Workflow</div>
</header>

<nav class="nav-bar" id="navBar">
  <button class="nav-btn active" data-tab="dashboard" onclick="showTab('dashboard')"><span>Dashboard</span></button>
  <button class="nav-btn" data-tab="postJob" onclick="showTab('postJob')"><span>Post Job</span></button>
  <button class="nav-btn" data-tab="underQc" onclick="showTab('underQc')"><span>Under QC</span><span class="badge hidden" id="badgeUnderQc">0</span></button>
  <button class="nav-btn" data-tab="pending" onclick="showTab('pending')"><span>Pending Approval</span><span class="badge hidden" id="badgePending">0</span></button>
  <button class="nav-btn" data-tab="history" onclick="showTab('history')"><span>History</span></button>
  <button class="nav-btn" data-tab="overdue" onclick="showTab('overdue')"><span>Overdue</span><span class="badge hidden" id="badgeOverdue">0</span></button>
</nav>

<main class="main-content" id="mainContent"></main>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwBLbJt9gYVY3-STKustZitf-phcGFPG3Fsn6pEhOnTTe52VI9kPN5nx3Wi2xRJE_Za/exec';
let currentTab = 'dashboard';
let templates = [];
let currentJob = null;
let currentInspectionData = {};

document.addEventListener('DOMContentLoaded', function() {
  showTab('dashboard');
  loadDashboard();
  updateBadges();
});

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  switch(tab) {
    case 'dashboard': renderDashboard(); loadDashboard(); break;
    case 'postJob': renderPostJob(); loadTemplates(); break;
    case 'underQc': renderJobList('UNDER_QC', 'Under QC Jobs'); break;
    case 'pending': renderJobList('PENDING_APPROVAL', 'Pending Approval'); break;
    case 'history': renderHistory(); break;
    case 'overdue': renderOverdue(); break;
  }
}

async function apiCall(action, data) {
  data = data || {};
  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action: action, ...data})
    });
    const result = await response.json();
    if (result.error) throw new Error(result.error);
    return result;
  } catch(err) {
    showToast('Error: ' + err.message, 'error');
    console.error(err);
    return {error: err.message};
  }
}

function renderDashboard() {
  document.getElementById('mainContent').innerHTML = `
    <div class="dashboard-grid" id="dashboardGrid">
      <div class="stat-card"><div class="label">Total Jobs</div><div class="value" id="statTotal">-</div></div>
      <div class="stat-card today"><div class="label">Today</div><div class="value" id="statToday">-</div></div>
      <div class="stat-card"><div class="label">Under QC</div><div class="value" id="statUnderQc">-</div></div>
      <div class="stat-card pending"><div class="label">Pending</div><div class="value" id="statPending">-</div></div>
      <div class="stat-card approved"><div class="label">Approved</div><div class="value" id="statApproved">-</div></div>
      <div class="stat-card rejected"><div class="label">Rejected</div><div class="value" id="statRejected">-</div></div>
      <div class="stat-card overdue"><div class="label">Overdue</div><div class="value" id="statOverdue">-</div></div>
    </div>
    <div class="card">
      <div class="card-header"><h3>Recent Activity</h3></div>
      <div class="card-body" id="recentActivity"><div class="loading"><div class="spinner"></div>Loading...</div></div>
    </div>`;
}

async function loadDashboard() {
  const result = await apiCall('getDashboard');
  if (result.error) return;
  document.getElementById('statTotal').textContent = result.totalJobs || 0;
  document.getElementById('statToday').textContent = result.todayJobs || 0;
  document.getElementById('statUnderQc').textContent = result.underQc || 0;
  document.getElementById('statPending').textContent = result.pendingApproval || 0;
  document.getElementById('statApproved').textContent = result.approved || 0;
  document.getElementById('statRejected').textContent = result.rejected || 0;
  document.getElementById('statOverdue').textContent = result.overdue || 0;
  const logs = await apiCall('getLogs');
  const container = document.getElementById('recentActivity');
  if (logs.logs && logs.logs.length > 0) {
    container.innerHTML = logs.logs.slice(0, 10).map(log =>
      `<div class="log-entry"><strong>${log.action}</strong> — ${log.jobId}<br><span class="time">${log.timestamp} | ${log.user}</span></div>`
    ).join('');
  } else {
    container.innerHTML = '<div class="empty-state">No recent activity</div>';
  }
}

async function updateBadges() {
  const result = await apiCall('getDashboard');
  if (result.error) return;
  updateBadge('badgeUnderQc', result.underQc);
  updateBadge('badgePending', result.pendingApproval);
  updateBadge('badgeOverdue', result.overdue);
}
function updateBadge(id, count) {
  const el = document.getElementById(id);
  if (el) { el.textContent = count; el.classList.toggle('hidden', count === 0); }
}

function renderPostJob() {
  document.getElementById('mainContent').innerHTML = `
    <div class="card">
      <div class="card-header"><h3>Create New Inspection Job</h3></div>
      <div class="card-body">
        <div class="form-grid">
          <div class="form-group"><label class="form-label">Part Number</label><select class="form-select" id="postPartNumber" onchange="onPartSelect()"><option value="">Select Part Number...</option></select></div>
          <div class="form-group"><label class="form-label">Description</label><input type="text" class="form-input" id="postDescription" readonly placeholder="Auto-filled"></div>
          <div class="form-group"><label class="form-label">Inspector</label><input type="text" class="form-input" id="postInspector" placeholder="Enter inspector name"></div>
          <div class="form-group"><label class="form-label">Due Date</label><input type="date" class="form-input" id="postDueDate"></div>

function checkSpec(value, spec) {
  if (!value || !spec) return '';
  const num = parseFloat(value);
  if (isNaN(num)) return '';
  if (spec.includes('±')) {
    const parts = spec.split('±');
    const base = parseFloat(parts[0].trim());
    const tolerance = parseFloat(parts[1].trim());
    if (!isNaN(base) && !isNaN(tolerance)) {
      return (num >= base - tolerance && num <= base + tolerance) ? 'spec-within' : 'spec-out';
    }
  }
  return '';
}
function checkSpecLive(input, spec) {
  input.className = 'measurement-input ' + checkSpec(input.value, spec);
}
function updateMeasurement(input) {
  const measurement = input.dataset.measurement;
  const row = parseInt(input.dataset.row);
  if (!currentInspectionData.measurements) currentInspectionData.measurements = [];
  if (!currentInspectionData.measurements[row]) currentInspectionData.measurements[row] = {};
  currentInspectionData.measurements[row][measurement] = input.value;
}
function setAppearanceResult(no, result, btn) {
  const parent = btn.parentElement;
  parent.querySelectorAll('.result-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (!currentInspectionData.appearanceChecks) currentInspectionData.appearanceChecks = [];
  currentInspectionData.appearanceChecks[no - 1] = {no: no, result: result};
}
function setFinalResult(result, btn) {
  const parent = btn.parentElement;
  parent.querySelectorAll('.final-result-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentInspectionData.finalResult = result;
}

async function handlePhotoUpload(input) {
  const files = input.files;
  if (!files.length) return;
  for (const file of files) {
    const reader = new FileReader();
    reader.onload = async function(e) {
      const base64 = e.target.result;
      const result = await apiCall('uploadPhoto', {
        jobId: currentJob, photoData: base64, fileName: file.name, mimeType: file.type, label: 'Inspection Photo'
      });
      if (result.success) addPhotoToGrid(result.photoUrl, result.photoId);
    };
    reader.readAsDataURL(file);
  }
}
function addPhotoToGrid(url, id) {
  const grid = document.getElementById('photoGrid');
  const div = document.createElement('div');
  div.className = 'photo-item';
  div.innerHTML = `<img src="${url}" alt="Photo" onclick="window.open('${url}', '_blank')"><button class="remove-btn" onclick="this.parentElement.remove()">&times;</button>`;
  grid.appendChild(div);
}
async function loadPhotosForJob(jobId) {

  if (result.photos) result.photos.forEach(p => addPhotoToGrid(p.photoUrl, p.photoId));

          <div class="form-group"><label class="form-label">Status</label><input class="form-input" value="${detail.status}" readonly></div>
          <div class="form-group"><label class="form-label">Due Date</label><input class="form-input" value="${detail.dueDate}" readonly></div>
          <div class="form-group"><label class="form-label">Created</label><input class="form-input" value="${detail.createdDate}" readonly></div>
          <div class="form-group"><label class="form-label">Supplier</label><input class="form-input" value="${detail.supplier || ''}" readonly></div>
          <div class="form-group"><label class="form-label">Qty</label><input class="form-input" value="${detail.qty || ''}" readonly></div>
          <div class="form-group"><label class="form-label">Result</label><input class="form-input" value="${detail.result || ''}" readonly></div>
          <div class="form-group"><label class="form-label">Remarks</label><input class="form-input" value="${detail.remarks || ''}" readonly></div>
        </div>
        ${detail.approverComments ? `<div class="form-group" style="margin-top: 16px;"><label class="form-label">Approver Comments</label><textarea class="form-textarea" readonly>${detail.approverComments}</textarea></div>` : ''}
        <div style="margin-top: 20px; display: flex; gap: 12px;">
          <button class="btn btn-primary" onclick="exportJob('${detail.jobId}')">Export to Excel</button>
          <button class="btn btn-outline" onclick="window.print()">Print</button>
          ${status === 'UNDER_QC' ? `<button class="btn btn-danger" onclick="deleteJob('${detail.jobId}')">Delete</button>` : ''}
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">Close</button></div>
    </div>`;
  document.body.appendChild(modal);
}

async function exportJob(jobId) {
  const result = await apiCall('exportJob', {jobId: jobId});
  if (result.success) { window.open(result.downloadUrl, '_blank'); showToast('Export generated', 'success'); }
}
async function deleteJob(jobId) {
  if (!confirm('Are you sure you want to delete this job?')) return;
  const result = await apiCall('deleteJob', {jobId: jobId});
  if (result.success) { showToast('Job deleted', 'success'); closeModal(); showTab('underQc'); updateBadges(); }
}

function renderHistory() {
  document.getElementById('mainContent').innerHTML = `
    <h2 class="section-title">Inspection History</h2>
    <div class="search-bar">
      <input type="text" class="form-input" id="searchPart" placeholder="Part Number...">
      <input type="text" class="form-input" id="searchInspector" placeholder="Inspector...">
      <input type="text" class="form-input" id="searchSupplier" placeholder="Supplier...">
      <input type="date" class="form-input" id="searchDateFrom" placeholder="From">
      <input type="date" class="form-input" id="searchDateTo" placeholder="To">
      <select class="form-select" id="searchStatus" style="width: 150px;"><option value="">All Status</option><option value="UNDER_QC">Under QC</option><option value="PENDING_APPROVAL">Pending</option><option value="APPROVED">Approved</option><option value="REJECTED">Rejected</option></select>
      <button class="btn btn-primary" onclick="searchHistory()">Search</button>
      <button class="btn btn-outline" onclick="clearSearch()">Clear</button>
    </div>
    <div id="historyResults"><div class="loading"><div class="spinner"></div>Loading history...</div></div>`;
  loadHistory();
}

async function loadHistory(filters) {
  filters = filters || {};
  const result = await apiCall('getHistory', filters);
  const container = document.getElementById('historyResults');
  if (result.error || !result.jobs || result.jobs.length === 0) {
    container.innerHTML = '<div class="empty-state">No records found</div>'; return;
  }
  container.innerHTML = `<div style="margin-bottom: 12px; color: var(--text-light); font-size: 0.85rem;">Found ${result.count} records</div>
    <table class="data-table"><thead><tr><th>Job ID</th><th>Part Number</th><th>Inspector</th><th>Status</th><th>Result</th><th>Due Date</th><th>Created</th><th>Action</th></tr></thead><tbody>
    ${result.jobs.map(job => `<tr><td><strong>${job.jobId}</strong></td><td>${job.partNumber}</td><td>${job.inspector}</td><td><span class="badge badge-${job.status.toLowerCase().replace('_', '')}">${job.status.replace('_', ' ')}</span></td><td>${job.result || '-'}</td><td>${job.dueDate}</td><td>${job.createdDate}</td><td><button class="btn btn-sm btn-outline" onclick="openJobDetail('${job.jobId}', '${job.status}')">View</button></td></tr>`).join('')}
    </tbody></table>`;
}

function searchHistory() {
  const filters = {};
  const part = document.getElementById('searchPart').value;
  const inspector = document.getElementById('searchInspector').value;
  const supplier = document.getElementById('searchSupplier').value;
  const dateFrom = document.getElementById('searchDateFrom').value;
  const dateTo = document.getElementById('searchDateTo').value;
  const status = document.getElementById('searchStatus').value;
  if (part) filters.partNumber = part;
  if (inspector) filters.inspector = inspector;
  if (supplier) filters.supplier = supplier;
  if (dateFrom) filters.dateFrom = dateFrom;
  if (dateTo) filters.dateTo = dateTo;
  if (status) filters.status = status;
  loadHistory(filters);
}
function clearSearch() {
  document.getElementById('searchPart').value = '';
  document.getElementById('searchInspector').value = '';
  document.getElementById('searchSupplier').value = '';
  document.getElementById('searchDateFrom').value = '';
  document.getElementById('searchDateTo').value = '';
  document.getElementById('searchStatus').value = '';
  loadHistory();
}

function renderOverdue() {
  document.getElementById('mainContent').innerHTML = `
    <h2 class="section-title">Overdue Inspections</h2>
    <div class="job-list" id="overdueList"><div class="loading"><div class="spinner"></div>Loading overdue jobs...</div></div>`;
  loadOverdue();
}

async function loadOverdue() {
  const result = await apiCall('getOverdue');
  const container = document.getElementById('overdueList');
  if (result.error || !result.jobs || result.jobs.length === 0) {
    container.innerHTML = '<div class="empty-state">No overdue jobs</div>'; return;
  }
  container.innerHTML = result.jobs.map(job => `
    <div class="job-card overdue" onclick="openJobDetail('${job.jobId}', 'UNDER_QC')">
      <div class="job-card-info">
        <h4>${job.jobId} — ${job.partNumber}</h4>
        <p>Inspector: ${job.inspector} | Due: ${job.dueDate} | <span class="badge badge-overdue">OVERDUE</span></p>
        <p style="font-size: 0.75rem; color: var(--text-light);">Created: ${job.createdDate} | Supplier: ${job.supplier || '-'} | Qty: ${job.qty || '-'}</p>
      </div>
      <div class="job-card-actions">
        <button class="btn btn-sm btn-primary" onclick="event.stopPropagation(); openInspection('${job.jobId}')">Inspect</button>
        <button class="btn btn-sm btn-outline" onclick="event.stopPropagation(); openJobDetail('${job.jobId}', 'UNDER_QC')">View</button>
      </div>
    </div>`).join('');
}

function closeModal() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.remove());
}
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('modal-overlay')) closeModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

function showToast(message, type) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(100%)'; setTimeout(() => toast.remove(), 300); }, 3000);
}

setInterval(() => { updateBadges(); }, 30000);
</script>
</body>
</html>
