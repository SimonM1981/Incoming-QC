<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC Portal Pro</title>
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f7f9; }
        .container { max-width: 1150px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 5px solid #007bff; }
        h2 { color: #007bff; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; font-weight: bold; color: #666; margin-bottom: 4px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box; }
        .btn { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-save { background: #007bff; }
        .btn-bulk { background: #28a745; width: 100%; margin-top: 10px; display: none; }
        .btn-update { background: #ffc107; color: #212529; display: none; margin-bottom: 15px; width: 100%; border: 2px solid #e0a800; font-size: 16px; }
        #paste-zone { border: 2px dashed #007bff; padding: 20px; text-align: center; background: #f0f7ff; border-radius: 8px; margin-top: 15px; cursor: pointer; }
        #search-box { margin-bottom: 15px; padding: 12px; width: 100%; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Data Entry</h2>
        <div class="form-grid">
            <div class="input-group"><label>Received Date</label><input type="date" id="m-date"></div>
            <div class="input-group"><label>Customer</label><input type="text" id="m-customer"></div>
            <div class="input-group"><label>P/I No.</label><input type="text" id="m-pi"></div>
            <div class="input-group"><label>Part No.</label><input type="text" id="m-part"></div>
            <div class="input-group"><label>Qty</label><input type="number" id="m-qty"></div>
            <div class="input-group"><label>Issued By</label><input type="text" id="m-issued"></div>
        </div>
        <button class="btn btn-save" onclick="saveManual()">Save New Entry</button>
        <div id="paste-zone">Click here & <b>Ctrl + V</b> to Paste from Excel</div>
        <button id="bulk-save-btn" class="btn btn-bulk" onclick="sendToSheets(bulkData)"></button>
    </div>

    <div class="card">
        <h2>Incoming Database</h2>
        <button id="update-btn" class="btn btn-update" onclick="commitUpdate()"></button>
        <input type="text" id="search-box" placeholder="🔍 Search Part Number...">
        <div id="main-table"></div>
    </div>
</div>

<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbxI9ULlAc5od8QU1Og3B6BdiYutO7Tx0ZkQYtcYBx1h_s93VVqCSbc4kzrr8cnTSRAX/exec";
    let bulkData = [];
    let pendingUpdate = null;

    const table = new Tabulator("#main-table", {
        height: "500px",
        layout: "fitColumns",
        columns: [
            {title: "ID", field: "0", visible: false}, // HIDDEN ID COLUMN
            {title: "Timestamp", field: "1", width: 150},
            {title: "Date", field: "2", width: 100},
            {title: "Customer", field: "3"},
            {title: "P/I No.", field: "4"},
            {title: "Part No.", field: "5"},
            {title: "Qty", field: "6", width: 90, editor: "number", cellEdited: function(cell) {
                const row = cell.getRow().getData();
                pendingUpdate = { action: "updateQty", id: row[0], newQty: cell.getValue() };
                const btn = document.getElementById('update-btn');
                btn.style.display = "block";
                btn.innerText = "⚠️ CONFIRM CHANGE: Qty " + cell.getValue() + " for Part " + row[5];
            }},
            {title: "Issued By", field: "7"},
        ],
    });

    async function loadData() {
        try {
            const response = await fetch(APP_URL);
            const data = await response.json();
            if (data.length > 1) { table.setData(data.slice(1).reverse()); }
        } catch (e) { console.log("Load failed"); }
    }

    async function commitUpdate() {
        const btn = document.getElementById('update-btn');
        btn.innerText = "Saving to Google Sheets...";
        btn.disabled = true;
        try {
            await fetch(APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(pendingUpdate) });
            setTimeout(() => { alert("Database Updated!"); location.reload(); }, 1500);
        } catch (e) { alert("Error."); btn.disabled = false; }
    }

    document.getElementById("search-box").addEventListener("keyup", (e) => {
        table.setFilter("5", "like", e.target.value);
    });

    function saveManual() {
        const data = {
            receivedDate: document.getElementById('m-date').value,
            customer: document.getElementById('m-customer').value,
            piNo: document.getElementById('m-pi').value,
            partNo: document.getElementById('m-part').value,
            qty: document.getElementById('m-qty').value,
            issuedBy: document.getElementById('m-issued').value
        };
        sendToSheets(data);
    }

    document.addEventListener('paste', (e) => {
        const text = e.clipboardData.getData('text');
        const rows = text.split('\n').filter(r => r.trim() !== "");
        bulkData = rows.map(r => {
            const c = r.split('\t');
            return { receivedDate: c[0], customer: c[1], piNo: c[2], partNo: c[3], qty: c[4], issuedBy: c[5] };
        });
        if(bulkData.length > 0) {
            const btn = document.getElementById('bulk-save-btn');
            btn.style.display = "block";
            btn.innerText = `Save ${bulkData.length} Rows from Excel`;
        }
    });

    async function sendToSheets(payload) {
        const btn = event.target;
        btn.innerText = "Saving...";
        btn.disabled = true;
        try {
            await fetch(APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
            setTimeout(() => { alert("Saved!"); location.reload(); }, 1500);
        } catch (e) { alert("Error."); btn.disabled = false; }
    }

    loadData();
</script>
</body>
</html>
