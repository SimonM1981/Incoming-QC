<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC Portal</title>
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f7f9; }
        .container { max-width: 1150px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 5px solid #007bff; }
        .btn { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        .btn-update { background: #ffc107; color: #212529; display: none; width: 100%; margin-bottom: 10px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>Data Entry</h2>
        <input type="date" id="m-date">
        <input type="text" id="m-customer" placeholder="Customer">
        <input type="text" id="m-pi" placeholder="P/I No.">
        <input type="text" id="m-part" placeholder="Part No.">
        <input type="number" id="m-qty" placeholder="Qty">
        <input type="text" id="m-issued" placeholder="Issued By">
        <button class="btn" style="background:#007bff" onclick="saveManual()">Save Entry</button>
    </div>

    <div class="card">
        <h2>Incoming Database</h2>
        <button id="update-btn" class="btn btn-update" onclick="commitUpdate()"></button>
        <input type="text" id="search-box" placeholder="🔍 Search Part Number...">
        <div id="main-table"></div>
    </div>
</div>

<script>
    const APP_URL = "YOUR_NEW_DEPLOYMENT_URL_HERE";
    let pendingUpdate = null;

    const table = new Tabulator("#main-table", {
        height: "500px",
        layout: "fitColumns",
        columns: [
            {title: "ID", field: "0", visible: false}, 
            {title: "Timestamp", field: "1", width: 130},
            {title: "Date", field: "2", width: 100},
            {title: "Customer", field: "3"},
            {title: "P/I No.", field: "4"},
            {title: "Part No.", field: "5"},
            {title: "Qty", field: "6", width: 100, editor: "number", cellEdited: function(cell){
                const row = cell.getRow().getData();
                pendingUpdate = { action: "updateQty", id: row[0], newQty: cell.getValue() };
                document.getElementById('update-btn').style.display = "block";
                document.getElementById('update-btn').innerText = "⚠️ SAVE: Change Part " + row[5] + " to Qty " + cell.getValue();
            }},
            {title: "Issued By", field: "7"},
        ],
    });

    async function loadData() {
        const res = await fetch(APP_URL);
        const data = await res.json();
        if (data.length > 1) table.setData(data.slice(1).reverse());
    }

    async function commitUpdate() {
        await fetch(APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(pendingUpdate) });
        alert("Updated!");
        location.reload();
    }

    function saveManual() {
        const data = {
            receivedDate: document.getElementById('m-date').value,
            customer: document.getElementById('m-customer').value,
            piNo: document.getElementById('m-pi').value,
            partNo: document.getElementById('m-part').value,
            qty: document.getElementById('m-qty').value,
            issuedBy: document.getElementById('m-issued').value
        };
        fetch(APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) })
        .then(() => { alert("Saved!"); location.reload(); });
    }

    document.getElementById("search-box").addEventListener("keyup", (e) => {
        table.setFilter("5", "like", e.target.value);
    });

    loadData();
</script>
</body>
</html>
